name: Question
description: Ask about setup, interpretation of results, or unsupervised metrics
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      placeholder: e.g. Why did NB1 choose k=2 if marketing wants more segments?
    validations:
      required: true
  - type: dropdown
    id: context
    attributes:
      label: Context
      options:
        - Installation / environment
        - Understanding RFM or clustering metrics
        - Interpreting a specific notebook’s results
        - Extending the project
        - Other
    validations:
      required: true
  - type: textarea
    id: already_tried
    attributes:
      label: What have you already read or tried?
      description: README sections, notebook cells, errors (if any)
